name: 🔄 Mettre à jour data.json

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Raison de la mise à jour (optionnel)'
        required: false
        default: 'Mise à jour manuelle'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Generate data.json
        env:
          WEBFLOW_TOKEN: ${{ secrets.WEBFLOW_TOKEN }}
        run: node scripts/generate-data.js

      - name: Commit & push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "🔄 data.json mis à jour - $(date '+%d/%m/%Y %H:%M') - ${{ github.event.inputs.reason }}"
          git push
